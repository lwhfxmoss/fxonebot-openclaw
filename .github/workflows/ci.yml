name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
    inputs:
      upstream_ref:
        description: "Upstream OpenClaw ref (branch/tag/sha)"
        required: false
        default: "v2026.3.2"

permissions:
  contents: read

jobs:
  scaffold-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify plugin repository scaffold
        run: |
          test -f README.md
          test -f CHANGELOG.md
          test -f LICENSE
          test -f package.json
          test -f openclaw.plugin.json
          test -f index.ts
          test -f docs/README.md
          test -f docs/INSTALLATION.md
          test -f docs/DEVELOPMENT.md
          test -f docs/ARCHITECTURE.md
          test -f docs/V0_2_0_QQ_DM_TYPING_PLAN.md
          test -f examples/openclaw.config.example.json
          test -f examples/napcat.websocket_client.example.json
          test -f scripts/ci_validate_upstream.sh
          test -f scripts/patch_openclaw_for_onebot_ci.mjs
          test -f src/channel.ts
          echo "scaffold_ok"

  upstream-release-validate:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - uses: pnpm/action-setup@v4
        with:
          version: "10"
          run_install: false
      - name: Validate against released OpenClaw target
        env:
          OPENCLAW_UPSTREAM_REF: ${{ github.event.inputs.upstream_ref }}
        run: bash scripts/ci_validate_upstream.sh
